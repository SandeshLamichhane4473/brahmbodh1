
<!DOCTYPE html>
<html lang="ne">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <!-- 
      STATIC FALLBACK meta tags — shown before React loads.
      react-helmet-async will OVERRIDE these with blog-specific
      values once the component mounts and blog data is fetched.
    -->
    <meta name="description" content="ब्रह्मबोध — तिमी मलाई समय देउ म तिमीलाई वेदान्त दिन्छु" />

    <!-- Open Graph fallbacks -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ब्रह्मबोध" />
    <meta property="og:title" content="ब्रह्मबोध" />
    <meta property="og:description" content="तिमी मलाई समय देउ म तिमीलाई वेदान्त दिन्छु" />
    <meta property="og:image" content="https://brahmbodh.netlify.app/og-default.jpg" />
    <meta property="og:url" content="https://brahmbodh.netlify.app" />

    <!-- Twitter fallbacks -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ब्रह्मबोध" />
    <meta name="twitter:description" content="तिमी मलाई समय देउ म तिमीलाई वेदान्त दिन्छु" />
    <meta name="twitter:image" content="https://brahmbodh.netlify.app/og-default.jpg" />

    <title>ब्रह्मबोध</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
